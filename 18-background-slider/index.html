<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Scout Slider | Day 18</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="slider-container">
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1440404653325-ab127d49abc1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1925&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1512466699144-8846f4144547?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1582711012124-a56cf82307a0?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80')"></div>
    
    <button class="arrow left-arrow" id="left">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <button class="arrow right-arrow" id="right">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
