<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Lockdown | Day 50</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="screen">
    <div class="glass-box">
      <h1>Set Lockdown</h1>
      <p>Keep the frame clear. Catch the distractions before they ruin the take.</p>
      <button class="btn" id="start-btn">Start Shoot</button>
    </div>
  </div>

  <div class="screen">
    <h1>Select Target Distraction</h1>
    <ul class="items-list">
      <li>
        <button class="choice-btn">
          <p>Paparazzi</p>
          <i class="fas fa-camera"></i>
        </button>
      </li>
      <li>
        <button class="choice-btn">
          <p>Rogue Mic</p>
          <i class="fas fa-microphone"></i>
        </button>
      </li>
      <li>
        <button class="choice-btn">
          <p>Stray Drone</p>
          <i class="fas fa-video"></i>
        </button>
      </li>
      <li>
        <button class="choice-btn">
          <p>Coffee Cup</p>
          <i class="fas fa-mug-hot"></i>
        </button>
      </li>
    </ul>
  </div>

  <div class="screen game-container" id="game-container">
    <h3 id="time" class="time">Time: 00:00</h3>
    <h3 id="score" class="score">Caught: 0</h3>
    <div id="message" class="message">
      <span>Warning:</span> Too many objects in frame! We're losing the light!
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
