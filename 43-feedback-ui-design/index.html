<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Screening Feedback | Day 43</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div id="panel" class="glass-container panel">
    <strong>How was the final cut?</strong>
    
    <div class="ratings-container">
      <div class="rating">
        <i class="fas fa-frown fa-3x"></i>
        <small>Needs Reshoots</small>
      </div>
      
      <div class="rating">
        <i class="fas fa-meh fa-3x"></i>
        <small>Decent Take</small>
      </div>
      
      <div class="rating active">
        <i class="fas fa-smile fa-3x"></i>
        <small>Masterpiece</small>
      </div>
    </div>
    
    <button class="btn" id="send">Wrap it up</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
