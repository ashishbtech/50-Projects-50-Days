<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Navigation | Day 45</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <button class="nav-btn open-btn">
    <i class="fas fa-bars"></i>
  </button>

  <div class="background-plate">
    <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1925&q=80" alt="Cinematic Set" class="bg-img">
    <div class="content">
      <h2>Studio Dashboard</h2>
      <p>Tap the menu icon to access production archives.</p>
    </div>
  </div>

  <div class="nav nav-deep">
    <div class="nav nav-mid">
      <div class="nav nav-front glass-container">
        <button class="nav-btn close-btn">
          <i class="fas fa-times"></i>
        </button>
        
        <div class="nav-header">
          <h3><i class="fas fa-film"></i> A15 Studios</h3>
        </div>

        <ul class="list">
          <li><a href="#"><i class="fas fa-video"></i> Active Shoots</a></li>
          <li><a href="#"><i class="fas fa-book-open"></i> Screenplays</a></li>
          <li><a href="#"><i class="fas fa-users"></i> Casting Roster</a></li>
          <li>
            <a href="#"><i class="fas fa-archive"></i> The Vault</a>
            <ul>
              <li><a href="#">Raw Footage</a></li>
              <li><a href="#">Audio Stems</a></li>
              <li><a href="#">VFX Assets</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
