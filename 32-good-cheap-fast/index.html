<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Constraints | Day 32</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="glass-container">
    <h2>Production Constraints</h2>
    <p>Select your project priorities. You can only pick two.</p>
    
    <div class="toggle-container">
      <input type="checkbox" id="good" class="toggle">
      <label for="good" class="label">
        <div class="ball"></div>
      </label>
      <span>High Quality</span>
    </div>
    
    <div class="toggle-container">
      <input type="checkbox" id="cheap" class="toggle">
      <label for="cheap" class="label">
        <div class="ball"></div>
      </label>
      <span>Low Budget</span>
    </div>
    
    <div class="toggle-container">
      <input type="checkbox" id="fast" class="toggle">
      <label for="fast" class="label">
        <div class="ball"></div>
      </label>
      <span>Fast Delivery</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
